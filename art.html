<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generative Art</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; cursor: crosshair; }
        canvas { display: block; }
        #ui {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 10;
        }
        #ui button {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3);
            color: #fff; padding: 8px 18px; border-radius: 20px; font-size: 14px;
            cursor: pointer; transition: all 0.3s; backdrop-filter: blur(8px);
        }
        #ui button:hover { background: rgba(255,255,255,0.25); }
        #ui button.active { background: rgba(255,255,255,0.3); border-color: #fff; }
        #hint {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.4); font-family: sans-serif; font-size: 13px;
            pointer-events: none; transition: opacity 1s;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="hint">click & move — space to clear</div>
    <div id="ui">
        <button class="active" data-mode="firework">Firework</button>
        <button data-mode="ripple">Ripple</button>
        <button data-mode="kaleidoscope">Kaleidoscope</button>
    </div>
    <script>
    (() => {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        let mode = 'firework';
        let mouseX = 0, mouseY = 0;
        let mouseDown = false;
        let hueShift = 0;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // --- Palette ---
        function hsl(h, s, l, a) {
            return `hsla(${h % 360}, ${s}%, ${l}%, ${a})`;
        }

        // ===== FIREWORK =====
        const particles = [];

        class Particle {
            constructor(x, y, angle, speed, hue, size) {
                this.x = x;
                this.y = y;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.hue = hue;
                this.size = size;
                this.life = 1;
                this.decay = 0.008 + Math.random() * 0.015;
                this.gravity = 0.02;
                this.trail = [];
            }
            update() {
                this.trail.push({ x: this.x, y: this.y, life: this.life });
                if (this.trail.length > 12) this.trail.shift();
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.99;
                this.vy *= 0.99;
                this.life -= this.decay;
            }
            draw() {
                // trail
                for (let i = 0; i < this.trail.length; i++) {
                    const t = this.trail[i];
                    const a = (i / this.trail.length) * t.life * 0.5;
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, this.size * (i / this.trail.length), 0, Math.PI * 2);
                    ctx.fillStyle = hsl(this.hue, 80, 60, a);
                    ctx.fill();
                }
                // head
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fillStyle = hsl(this.hue, 90, 70, this.life);
                ctx.fill();
            }
        }

        function emitFirework(x, y) {
            const count = 40 + Math.random() * 60;
            const baseHue = hueShift + Math.random() * 60;
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.3;
                const speed = 1.5 + Math.random() * 4;
                const size = 1.5 + Math.random() * 2.5;
                particles.push(new Particle(x, y, angle, speed, baseHue + Math.random() * 30, size));
            }
        }

        function updateFirework() {
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) particles.splice(i, 1);
            }
        }

        // ===== RIPPLE =====
        const ripples = [];

        class Ripple {
            constructor(x, y, hue) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = 100 + Math.random() * 200;
                this.speed = 1.5 + Math.random() * 2;
                this.hue = hue;
                this.life = 1;
            }
            update() {
                this.radius += this.speed;
                this.life = 1 - this.radius / this.maxRadius;
            }
            draw() {
                if (this.life <= 0) return;
                const grad = ctx.createRadialGradient(
                    this.x, this.y, this.radius * 0.8,
                    this.x, this.y, this.radius
                );
                grad.addColorStop(0, hsl(this.hue, 70, 50, 0));
                grad.addColorStop(0.5, hsl(this.hue, 80, 60, this.life * 0.6));
                grad.addColorStop(1, hsl(this.hue, 70, 50, 0));
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = hsl(this.hue, 80, 65, this.life * 0.8);
                ctx.lineWidth = 2 * this.life;
                ctx.stroke();

                // inner glow
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.fill();
            }
        }

        let rippleTimer = 0;
        function updateRipple() {
            for (let i = ripples.length - 1; i >= 0; i--) {
                ripples[i].update();
                ripples[i].draw();
                if (ripples[i].life <= 0) ripples.splice(i, 1);
            }
        }

        // ===== KALEIDOSCOPE =====
        const kShapes = [];
        let kAngle = 0;
        const K_SEGMENTS = 8;

        class KShape {
            constructor(x, y, hue) {
                this.ox = x - W / 2;
                this.oy = y - H / 2;
                this.hue = hue;
                this.size = 3 + Math.random() * 8;
                this.life = 1;
                this.decay = 0.005 + Math.random() * 0.008;
                this.sides = 3 + Math.floor(Math.random() * 4);
                this.rotSpeed = (Math.random() - 0.5) * 0.04;
                this.rot = Math.random() * Math.PI * 2;
                this.drift = 0.3 + Math.random() * 0.5;
                this.angle = Math.atan2(this.oy, this.ox);
                this.dist = Math.sqrt(this.ox * this.ox + this.oy * this.oy);
            }
            update() {
                this.life -= this.decay;
                this.rot += this.rotSpeed;
                this.dist += this.drift;
            }
            draw() {
                if (this.life <= 0) return;
                const cx = W / 2;
                const cy = H / 2;
                ctx.save();
                ctx.translate(cx, cy);

                for (let s = 0; s < K_SEGMENTS; s++) {
                    const segAngle = (Math.PI * 2 / K_SEGMENTS) * s + kAngle;
                    const flip = s % 2 === 0 ? 1 : -1;
                    const px = Math.cos(this.angle * flip + segAngle) * this.dist;
                    const py = Math.sin(this.angle * flip + segAngle) * this.dist;

                    ctx.save();
                    ctx.translate(px, py);
                    ctx.rotate(this.rot);
                    ctx.beginPath();
                    for (let i = 0; i < this.sides; i++) {
                        const a = (Math.PI * 2 / this.sides) * i;
                        const r = this.size * this.life;
                        const method = i === 0 ? 'moveTo' : 'lineTo';
                        ctx[method](Math.cos(a) * r, Math.sin(a) * r);
                    }
                    ctx.closePath();
                    ctx.fillStyle = hsl(this.hue, 75, 55, this.life * 0.7);
                    ctx.strokeStyle = hsl(this.hue + 30, 80, 70, this.life * 0.9);
                    ctx.lineWidth = 1;
                    ctx.fill();
                    ctx.stroke();
                    ctx.restore();
                }
                ctx.restore();
            }
        }

        function updateKaleidoscope() {
            kAngle += 0.003;
            for (let i = kShapes.length - 1; i >= 0; i--) {
                kShapes[i].update();
                kShapes[i].draw();
                if (kShapes[i].life <= 0) kShapes.splice(i, 1);
            }
        }

        // --- Input ---
        canvas.addEventListener('mousedown', (e) => {
            mouseDown = true;
            mouseX = e.clientX;
            mouseY = e.clientY;
            if (mode === 'firework') emitFirework(e.clientX, e.clientY);
            if (mode === 'ripple') ripples.push(new Ripple(e.clientX, e.clientY, hueShift + Math.random() * 40));
            if (mode === 'kaleidoscope') kShapes.push(new KShape(e.clientX, e.clientY, hueShift));
        });
        canvas.addEventListener('mouseup', () => mouseDown = false);
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            if (mouseDown) {
                if (mode === 'firework' && Math.random() < 0.15) emitFirework(e.clientX, e.clientY);
                if (mode === 'ripple' && Math.random() < 0.3) ripples.push(new Ripple(e.clientX, e.clientY, hueShift + Math.random() * 40));
                if (mode === 'kaleidoscope') kShapes.push(new KShape(e.clientX, e.clientY, hueShift));
            }
        });

        // touch support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            mouseDown = true;
            const t = e.touches[0];
            mouseX = t.clientX; mouseY = t.clientY;
            if (mode === 'firework') emitFirework(t.clientX, t.clientY);
            if (mode === 'ripple') ripples.push(new Ripple(t.clientX, t.clientY, hueShift + Math.random() * 40));
            if (mode === 'kaleidoscope') kShapes.push(new KShape(t.clientX, t.clientY, hueShift));
        }, { passive: false });
        canvas.addEventListener('touchend', () => mouseDown = false);
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const t = e.touches[0];
            mouseX = t.clientX; mouseY = t.clientY;
            if (mode === 'firework' && Math.random() < 0.15) emitFirework(t.clientX, t.clientY);
            if (mode === 'ripple' && Math.random() < 0.3) ripples.push(new Ripple(t.clientX, t.clientY, hueShift + Math.random() * 40));
            if (mode === 'kaleidoscope') kShapes.push(new KShape(t.clientX, t.clientY, hueShift));
        }, { passive: false });

        // keyboard
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                particles.length = 0;
                ripples.length = 0;
                kShapes.length = 0;
                ctx.clearRect(0, 0, W, H);
            }
        });

        // mode buttons
        document.querySelectorAll('#ui button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#ui button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                mode = btn.dataset.mode;
            });
        });

        // hide hint after a few seconds
        setTimeout(() => {
            document.getElementById('hint').style.opacity = '0';
        }, 4000);

        // --- Main Loop ---
        function loop() {
            // fade effect for trails
            ctx.fillStyle = 'rgba(0, 0, 0, 0.06)';
            ctx.fillRect(0, 0, W, H);

            hueShift += 0.3;

            if (mode === 'firework') updateFirework();
            if (mode === 'ripple') updateRipple();
            if (mode === 'kaleidoscope') updateKaleidoscope();

            // ambient particles (subtle background life)
            if (Math.random() < 0.02) {
                const ax = Math.random() * W;
                const ay = Math.random() * H;
                if (mode === 'firework') {
                    for (let i = 0; i < 5; i++) {
                        const angle = Math.random() * Math.PI * 2;
                        particles.push(new Particle(ax, ay, angle, 0.5 + Math.random(), hueShift + 180, 1));
                    }
                }
                if (mode === 'ripple') {
                    ripples.push(new Ripple(ax, ay, hueShift + 180));
                }
            }

            requestAnimationFrame(loop);
        }
        loop();
    })();
    </script>
</body>
</html>
